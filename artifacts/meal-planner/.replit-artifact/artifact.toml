kind = "mobile"
previewPath = "/"
title = "Campus Meals"
version = "1.0.0"
id = "artifacts/meal-planner"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23054

[services.development]
run = "pnpm --filter @workspace/meal-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meal-planner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/meal-planner", "run", "serve" ]

[services.env]
PORT = "23054"
BASE_PATH = "/"
